# Training Configuration for Wall-X Robotic Multi-Modal Learning
# This configuration supports multi-modal learning with vision, language, and action data

# Model and paths configuration
log_name: "wall_oss_flow_put_back_block-demo_clean_200"
log_project: "vla_training"
model_type: wall-oss
pretrained_wallx_path: "/mnt/pfs/pg4hw0/niantian/model_weights/wall-oss-flow-zju14"
processor_path: "/mnt/pfs/pg4hw0/niantian/model_weights/wall-oss-flow-zju14"
save_path: "/mnt/pfs/pg4hw0/niantian/wall-x_bak/workspace/outputs/wall_oss_flow_ft_put_back_block-demo_clean_200"
use_fast_tokenizer: False                       # True: train FAST, False: train Flow
action_tokenizer_path: "/path/to/fast/"         # Must set if use_fast_tokenizer is true

# Torch Profile
profile: False
profile_save_path: /path/to/profile/
profile_wait_iters: 10
profile_warmup_iters: 5
profile_active_iters: 2

# Training hyperparameters
num_warmup_steps: 100
num_training_steps: 64000000
learning_rate: 0.00005
min_lr: 0.00005
num_epoch: 100
gradient_accumulation_steps: 32
batch_size_per_gpu: 2
padding_side: left
epoch_save_interval: 1

# Training optimization settings
FSDP2: True
torch_compile: False

# Robot configuration - Define degrees of freedom for each component
dof_config:
  right_waist: 1
  right_shoulder: 1
  right_elbow: 1
  right_forearm_roll: 1
  right_wrist_angle: 1
  right_wrist_rotate: 1
  right_gripper: 1
  left_waist: 1
  left_shoulder: 1
  left_elbow: 1
  left_forearm_roll: 1
  left_wrist_angle: 1
  left_wrist_rotate: 1
  left_gripper: 1

# Agent proprioception configuration (typically matches DOF config)
agent_pos_config:
  right_waist: 1
  right_shoulder: 1
  right_elbow: 1
  right_forearm_roll: 1
  right_wrist_angle: 1
  right_wrist_rotate: 1
  right_gripper: 1
  left_waist: 1
  left_shoulder: 1
  left_elbow: 1
  left_forearm_roll: 1
  left_wrist_angle: 1
  left_wrist_rotate: 1
  left_gripper: 1

# # Checkpoint resuming configuration
# resume:
#   ckpt: "/path/to/resume_model/"
#   load_ckpt_only: true

norm_stats_path: "/mnt/pfs/pg4hw0/niantian/wall-x_bak/workspace/lerobot_example/stats/put_back_block-demo_clean_200_norm_stats.json"

enable_customized_robot_config: true
customized_robot_config:
  name: "put_back_block-demo_clean_200"
  customized_dof_config:
    "right_waist": 1
    "right_shoulder": 1
    "right_elbow": 1
    "right_forearm_roll": 1
    "right_wrist_angle": 1
    "right_wrist_rotate": 1
    "right_gripper": 1
    "left_waist": 1
    "left_shoulder": 1
    "left_elbow": 1
    "left_forearm_roll": 1
    "left_wrist_angle": 1
    "left_wrist_rotate": 1
    "left_gripper": 1

  customized_agent_pos_config:
    "right_waist": 1
    "right_shoulder": 1
    "right_elbow": 1
    "right_forearm_roll": 1
    "right_wrist_angle": 1
    "right_wrist_rotate": 1
    "right_gripper": 1
    "left_waist": 1
    "left_shoulder": 1
    "left_elbow": 1
    "left_forearm_roll": 1
    "left_wrist_angle": 1
    "left_wrist_rotate": 1
    "left_gripper": 1

# Data configuration
data:
  use_lerobot: true

  # LeRobot dataset configuration
  lerobot_config:
    repo_id: "put_back_block-demo_clean_200"
    root: "/mnt/pfs/pg4hw0/niantian/lerobot/put_back_block-demo_clean_200/"
    episodes: null
    image_transforms: null
    delta_timestamps: null
    tolerance_s: 1e-4
    revision: null
    force_cache_sync: false
    download_videos: false
    video_backend: null

  action_horizon: 32
  train_test_split: 0.95

  # Action keys for observation and prediction
  obs_action_keys:
    - right_waist
    - right_shoulder
    - right_elbow
    - right_forearm_roll
    - right_wrist_angle
    - right_wrist_rotate
    - right_gripper
    - left_waist
    - left_shoulder
    - left_elbow
    - left_forearm_roll
    - left_wrist_angle
    - left_wrist_rotate
    - left_gripper

  predict_action_keys:
    - right_waist
    - right_shoulder
    - right_elbow
    - right_forearm_roll
    - right_wrist_angle
    - right_wrist_rotate
    - right_gripper
    - left_waist
    - left_shoulder
    - left_elbow
    - left_forearm_roll
    - left_wrist_angle
    - left_wrist_rotate
    - left_gripper

  # Image resolution configuration for different camera views
  resolution:
    face_view: 256
    left_wrist_view: 256
    right_wrist_view: 256
    move1_view: 256
    move2_view: 256
    top_view: 256
    wall_view: 256
    multi_modal: 256
